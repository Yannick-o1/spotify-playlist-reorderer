name: Reorder Spotify playlist

on:
  workflow_dispatch:
    inputs:
      order_mode:
        description: "Override ORDER_MODE for this run"
        required: false
        type: string
  schedule:
    # GitHub's shortest scheduled workflow interval is every 5 minutes.
    - cron: "*/5 * * * *"

concurrency:
  group: spotify-playlist-reorder
  cancel-in-progress: false

jobs:
  reorder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Check source
        run: npm run check
      - name: Reorder playlist
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          SPOTIFY_PLAYLIST_ID: ${{ secrets.SPOTIFY_PLAYLIST_ID }}
          ORDER_MODE: ${{ inputs.order_mode || secrets.ORDER_MODE || 'random-eccentric' }}
          ORDER_SEED: ${{ secrets.ORDER_SEED }}
        run: npm start
